<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KI-Werkstatt — Ist Ihr Unternehmen KI-tauglich?</title>
<meta name="description" content="KI-Werkstatt am Tag der Industriekommunikation 2026: Quick-Check für 360° KI-Marketing. GEO-Check, LinkedIn-Check und KI-Demos. Sichern Sie sich Ihren Werkstatt-Slot." />
<!-- Schriften: Poppins (Headline + Text) & EB Garamond italic (Subline).
     HINWEIS: vorübergehend über Google Fonts geladen. Für DSGVO-Konformität
     im nächsten Schritt wie bisher als woff2 selbst hosten. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />
<link rel="icon" type="image/png" href="assets/favicon.png" />
<link rel="apple-touch-icon" href="assets/favicon.png" />
<link rel="preload" as="image" href="assets/hero-moon.webp" fetchpriority="high" />
<style>
  :root{
    /* ===== HELLES THEME ===== */
    --bg-0:#ffffff;
    --bg-1:#f4f7fb;
    --bg-2:#e9eff7;
    --ink:#0e1b2e;
    --ink-dim:#46566e;
    --muted:#69788e;
    --line:rgba(18,38,66,.12);
    --line-strong:rgba(18,38,66,.22);
    /* tweakable — set by app.jsx on :root */
    --accent:#db0a30;        /* signal red lead */
    --accent-2:#06d6a0;      /* mint highlight */
    --cta:#db0a30;           /* CTA = Marken-Rot */
    --cta-ink:#ffffff;
    --caution:#c98a00;       /* construction caution amber (deeper for white) */
    --glass:rgba(255,255,255,.62);
    --glass-line:rgba(18,38,66,.12);
    --glow:1;                /* 0..1.4 intensity multiplier */
    --maxw:1240px;
  }

  /* ===== dunkle cinematische Bänder behalten helle Text-Tokens ===== */
  .mt-band, .schild, .tik-badge{
    --ink:#eaf6ff; --ink-dim:#b9c8dc; --muted:#8da2bb;
    --line:rgba(140,180,220,.16); --line-strong:rgba(150,200,235,.30);
    --glass:rgba(12,20,38,.5); --glass-line:rgba(150,200,235,.16);
    color:var(--ink);
  }
  *{box-sizing:border-box}
  /* Lenis drives smooth scroll — keep native scroll-behavior out of the way (Lenis falls back gracefully when disabled) */
  html{scroll-behavior:auto}
  html.lenis,html.lenis body{height:auto}
  .lenis.lenis-smooth{scroll-behavior:auto !important}
  .lenis.lenis-smooth [data-lenis-prevent]{overscroll-behavior:contain}
  .lenis.lenis-stopped{overflow:hidden}
  @media (prefers-reduced-motion: reduce){ html{scroll-behavior:auto} }
  body{
    margin:0;
    background:var(--bg-0);
    color:var(--ink);
    font-family:"Poppins",system-ui,sans-serif;
    font-weight:300;
    -webkit-font-smoothing:antialiased;
    overflow-x:clip;
    line-height:1.55;
  }
  h1,h2,h3,h4,.display{font-family:"Poppins",system-ui,sans-serif;font-weight:600;line-height:1.02;letter-spacing:-.02em;margin:0}
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}
  ::selection{background:var(--accent);color:#04121a}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:4px}

  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px;width:100%}
  @media (max-width:640px){ .wrap{padding:0 18px} }

  /* ---- HUD lines / eyebrow ---- */
  .eyebrow{
    display:inline-flex;align-items:center;gap:10px;
    font-family:"Poppins",sans-serif;font-weight:500;
    font-size:12.5px;letter-spacing:.34em;text-transform:uppercase;
    color:var(--accent);
  }
  .eyebrow::before{content:"";width:30px;height:1px;background:linear-gradient(90deg,transparent,var(--accent))}
  .tick{color:var(--muted)}

  /* ---- buttons ---- */
  .btn{
    position:relative;display:inline-flex;align-items:center;justify-content:center;gap:10px;
    font-family:"Poppins",sans-serif;font-weight:600;font-size:15px;letter-spacing:.01em;
    padding:15px 26px;border-radius:2px;cursor:pointer;border:0;
    transition:transform .25s cubic-bezier(.2,.8,.2,1), box-shadow .3s, background .3s;
    will-change:transform;text-align:center;
  }
  .btn-cta{
    background:var(--cta);color:var(--cta-ink);
    box-shadow:0 0 0 1px color-mix(in srgb, var(--cta) 60%, white 0%),
               0 8px 30px color-mix(in srgb, var(--cta) 45%, transparent),
               0 0 calc(40px*var(--glow)) color-mix(in srgb, var(--cta) 55%, transparent);
  }
  .btn-cta:hover{ box-shadow:0 0 0 1px var(--cta), 0 10px 40px color-mix(in srgb,var(--cta) 60%, transparent), 0 0 calc(64px*var(--glow)) color-mix(in srgb,var(--cta) 70%, transparent) }
  .btn-ghost{
    background:rgba(180,220,255,.04);color:var(--ink);
    box-shadow:inset 0 0 0 1px var(--line-strong);
  }
  .btn-ghost:hover{ box-shadow:inset 0 0 0 1px var(--accent), 0 0 calc(30px*var(--glow)) color-mix(in srgb,var(--accent) 30%, transparent); color:#fff }
  .btn svg{width:16px;height:16px;flex:none}

  /* ---- construction / hazard motifs ---- */
  .hazard{
    background-image:repeating-linear-gradient(45deg, var(--caution) 0 16px, #0b0e16 16px 32px);
  }
  .hazard-edge{ height:7px; width:100%; }
  .hazard-edge.thin{ height:5px; }
  @keyframes hazardscroll{ to{ background-position:64px 0; } }
  @media (prefers-reduced-motion: no-preference){
    .hazard-edge.animate{ animation:hazardscroll 3s linear infinite; }
  }
  .caution-tag{
    display:inline-flex;align-items:center;gap:8px;
    font-family:"Poppins",sans-serif;font-weight:600;font-size:11.5px;
    letter-spacing:.2em;text-transform:uppercase;color:var(--caution);
  }

  /* ---- live / scan animations for the Stand section ---- */
  .live-dot{
    width:8px;height:8px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 0 color-mix(in srgb,var(--accent) 70%, transparent);
    display:inline-block;
  }
  @keyframes livepulse{
    0%{ box-shadow:0 0 0 0 color-mix(in srgb,var(--accent) 65%, transparent); }
    70%{ box-shadow:0 0 0 8px transparent; }
    100%{ box-shadow:0 0 0 0 transparent; }
  }
  .scanbar-track{position:relative;height:4px;border-radius:3px;background:rgba(140,190,230,.12);overflow:hidden}
  .scanbar-seg{position:absolute;top:0;bottom:0;width:38%;border-radius:3px;
    background:linear-gradient(90deg,transparent,var(--accent),transparent);
    box-shadow:0 0 14px color-mix(in srgb,var(--accent) 60%, transparent);}
  @keyframes scansweep{ 0%{left:-40%} 100%{left:100%} }

  /* ---- BIG scan console (GEO / LinkedIn focus visual) ---- */
  .bigscan{ position:relative; width:100%; height:clamp(190px,30vh,300px); border-radius:8px; overflow:hidden;
    border:1px solid color-mix(in srgb,var(--accent) 32%, transparent);
    background:linear-gradient(0deg, color-mix(in srgb,var(--accent) 8%, transparent), transparent 60%), rgba(248,250,253,.6);
    box-shadow: inset 0 0 70px color-mix(in srgb,var(--accent) 12%, transparent), 0 30px 80px rgba(0,0,0,.55);
    backdrop-filter: blur(2px); }
  .bigscan-grid{ position:absolute; inset:0; opacity:.16; pointer-events:none; mix-blend-mode:screen;
    background-image:linear-gradient(color-mix(in srgb,var(--accent) 60%,transparent) 1px,transparent 1px),
      linear-gradient(90deg,color-mix(in srgb,var(--accent) 60%,transparent) 1px,transparent 1px);
    background-size:46px 46px; }
  .bigscan-head{ position:absolute; top:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between;
    padding:18px 22px; z-index:3; font-family:"Poppins",sans-serif; }
  .bigscan-label{ font-weight:600; font-size:clamp(13px,1.5vw,18px); letter-spacing:.18em; text-transform:uppercase; color:var(--accent); }
  .bigscan-readout{ display:inline-flex; align-items:center; gap:10px; font-size:clamp(12px,1.3vw,15px); letter-spacing:.12em; color:var(--ink-dim); }
  .bigscan-cols{ position:absolute; left:22px; right:22px; top:64px; bottom:42px; display:flex; align-items:flex-end; gap:5px; z-index:2; }
  .bigscan-col{ flex:1; min-width:2px; border-radius:2px; transform-origin:bottom; transform:scaleY(.22); opacity:.5;
    background:linear-gradient(0deg, var(--accent), color-mix(in srgb,var(--accent) 22%, transparent)); }
  @keyframes scanbars{ 0%,100%{ transform:scaleY(.18); opacity:.42 } 50%{ transform:scaleY(1); opacity:.95 } }
  .bigscan-sweep{ position:absolute; top:0; bottom:0; width:2px; z-index:4; left:-3%;
    background:linear-gradient(180deg,transparent,var(--accent),transparent);
    box-shadow:0 0 26px 7px color-mix(in srgb,var(--accent) 75%, transparent); }
  @keyframes bigsweep{ 0%{left:-3%} 100%{left:103%} }
  .bigscan-track{ position:absolute; left:22px; right:22px; bottom:18px; height:7px; border-radius:6px; z-index:3;
    background:rgba(140,190,230,.14); overflow:hidden; }
  .bigscan-seg{ position:absolute; top:0; bottom:0; width:34%; left:-34%; border-radius:6px;
    background:linear-gradient(90deg,transparent,var(--accent),transparent);
    box-shadow:0 0 16px color-mix(in srgb,var(--accent) 60%, transparent); }
  @media (prefers-reduced-motion: no-preference){
    .bigscan-col{ animation:scanbars 1.5s ease-in-out infinite; }
    .bigscan-sweep{ animation:bigsweep 2.6s cubic-bezier(.5,0,.5,1) infinite; }
    .bigscan-seg{ animation:scansweep 2.2s cubic-bezier(.5,0,.5,1) infinite; }
  }
  @media (prefers-reduced-motion: reduce){
    .bigscan-col{ transform:scaleY(.6); opacity:.75; }
    .bigscan-sweep{ left:48%; }
    .bigscan-seg{ left:33%; }
  }
  .scanline{position:absolute;left:0;right:0;height:34%;pointer-events:none;opacity:.25;
    background:linear-gradient(180deg, color-mix(in srgb,var(--accent) 22%, transparent), transparent);
    border-bottom:1px solid color-mix(in srgb,var(--accent) 60%, transparent);}
  @keyframes scanmove{ 0%{top:-34%} 100%{top:100%} }
  @keyframes conebob{ 0%,100%{transform:translateY(0) rotate(-4deg)} 50%{transform:translateY(-12px) rotate(4deg)} }
  @keyframes procdots{ 0%,80%,100%{opacity:.25} 40%{opacity:1} }
  @media (prefers-reduced-motion: no-preference){
    .live-dot{ animation:livepulse 1.8s ease-out infinite; }
    .scanbar-seg{ animation:scansweep 2.2s cubic-bezier(.5,0,.5,1) infinite; }
    .scanline{ animation:scanmove 4.5s linear infinite; }
    .cone-float{ animation:conebob 5s ease-in-out infinite; }
    .proc-dot{ animation:procdots 1.4s ease-in-out infinite; }
  }

  /* ---- scan frame: blinking neon corner markers ---- */
  .scan-corner{ position:absolute; width:46px; height:46px; pointer-events:none; z-index:3;
    filter:drop-shadow(0 0 10px var(--accent)); }
  .scan-corner.tl{ top:18px; left:18px; border-top:3px solid var(--accent); border-left:3px solid var(--accent); }
  .scan-corner.tr{ top:18px; right:18px; border-top:3px solid var(--accent); border-right:3px solid var(--accent); }
  .scan-corner.bl{ bottom:18px; left:18px; border-bottom:3px solid var(--accent); border-left:3px solid var(--accent); }
  .scan-corner.br{ bottom:18px; right:18px; border-bottom:3px solid var(--accent); border-right:3px solid var(--accent); }
  @keyframes cornerblink{ 0%{ opacity:1; filter:drop-shadow(0 0 14px var(--accent)) brightness(1.4) } 50%{ opacity:.12; filter:drop-shadow(0 0 2px var(--accent)) brightness(.8) } 100%{ opacity:1; filter:drop-shadow(0 0 14px var(--accent)) brightness(1.4) } }
  @media (prefers-reduced-motion: no-preference){
    .scan-corner.tl{ animation:cornerblink 1.05s ease-in-out infinite; }
    .scan-corner.tr{ animation:cornerblink 1.05s ease-in-out infinite .26s; }
    .scan-corner.br{ animation:cornerblink 1.05s ease-in-out infinite .52s; }
    .scan-corner.bl{ animation:cornerblink 1.05s ease-in-out infinite .78s; }
  }

  /* ---- mouse scan reticle ---- */
  .scan-layer{ position:absolute; inset:0; z-index:3; pointer-events:none; opacity:0; transition:opacity .3s; }
  .scan-v{ position:absolute; top:0; bottom:0; left:0; width:1px; will-change:transform;
    background:linear-gradient(180deg, transparent, color-mix(in srgb,var(--accent) 85%, transparent), transparent); opacity:.4; }
  .scan-h{ position:absolute; left:0; right:0; top:0; height:1px; will-change:transform;
    background:linear-gradient(90deg, transparent, color-mix(in srgb,var(--accent) 85%, transparent), transparent); opacity:.4; }
  .scan-reticle{ position:absolute; top:0; left:0; width:76px; height:76px; will-change:transform; }
  .scan-reticle .ring{ position:absolute; inset:0; border-radius:50%; border:1px solid color-mix(in srgb,var(--accent) 75%, transparent); }
  .scan-reticle .ring2{ position:absolute; inset:0; border-radius:50%; border:1px solid color-mix(in srgb,var(--accent) 60%, transparent); }
  @keyframes retpulse{ 0%{ transform:scale(.55); opacity:.85 } 100%{ transform:scale(1.25); opacity:0 } }
  @media (prefers-reduced-motion: no-preference){ .scan-reticle .ring2{ animation:retpulse 1.7s ease-out infinite; } }
  .scan-reticle .ch{ position:absolute; background:var(--accent); opacity:.85; }
  .scan-reticle .ch.h{ top:50%; left:9px; right:9px; height:1px; }
  .scan-reticle .ch.v{ left:50%; top:9px; bottom:9px; width:1px; }
  .scan-reticle .dot{ position:absolute; top:50%; left:50%; width:5px; height:5px; border-radius:50%; transform:translate(-50%,-50%); background:var(--accent); box-shadow:0 0 9px var(--accent); }
  .scan-reticle .lbl{ position:absolute; top:100%; left:50%; transform:translateX(-50%); margin-top:9px; font-family:"Poppins",sans-serif; font-weight:600; font-size:9px; letter-spacing:.32em; color:var(--accent); white-space:nowrap; }

  /* ---- global scan cursor (whole page) ---- */
  .scan-cursor{ position:fixed; inset:0; z-index:9000; pointer-events:none; opacity:0; transition:opacity .35s; }
  .scan-cursor .scan-v, .scan-cursor .scan-h{ opacity:.18; }
  /* lock-on targeting frame (snaps to CTAs) */
  .scan-lock{ position:absolute; left:0; top:0; width:0; height:0; opacity:0;
    transition:left .16s cubic-bezier(.2,.9,.2,1), top .16s cubic-bezier(.2,.9,.2,1), width .16s cubic-bezier(.2,.9,.2,1), height .16s cubic-bezier(.2,.9,.2,1), opacity .18s; }
  .scan-cursor.locked .scan-lock{ opacity:1; animation:lockin .24s ease-out; }
  .scan-cursor.locked .scan-reticle{ opacity:0; }
  @keyframes lockin{ 0%{ transform:scale(1.3) } 60%{ transform:scale(.96) } 100%{ transform:scale(1) } }
  .scan-lock .cnr{ position:absolute; width:15px; height:15px; border:2px solid var(--accent); filter:drop-shadow(0 0 6px color-mix(in srgb,var(--accent) 80%, transparent)); }
  .scan-lock .cnr.tl{ left:-7px; top:-7px; border-right:0; border-bottom:0; }
  .scan-lock .cnr.tr{ right:-7px; top:-7px; border-left:0; border-bottom:0; }
  .scan-lock .cnr.bl{ left:-7px; bottom:-7px; border-right:0; border-top:0; }
  .scan-lock .cnr.br{ right:-7px; bottom:-7px; border-left:0; border-top:0; }
  .scan-lock .lock-lbl{ position:absolute; bottom:100%; left:0; margin-bottom:8px; font-family:"Poppins",sans-serif;
    font-weight:600; font-size:9px; letter-spacing:.32em; text-transform:uppercase; color:var(--accent); white-space:nowrap;
    text-shadow:0 0 10px color-mix(in srgb,var(--accent) 60%, transparent); }
  @media (prefers-reduced-motion: no-preference){ .scan-cursor.locked .scan-lock .cnr{ animation:lockpulse 1.4s ease-in-out infinite; } }
  @keyframes lockpulse{ 0%,100%{ opacity:1 } 50%{ opacity:.45 } }

  /* ---- team::mt-Logo als globaler Scan-Cursor (ersetzt Kreis + Fadenkreuz) ---- */
  .scan-cursor .scan-reticle .ring,
  .scan-cursor .scan-reticle .ring2,
  .scan-cursor .scan-reticle .ch,
  .scan-cursor .scan-reticle .dot{ display:none !important; }
  .scan-cursor .scan-reticle::before{
    content:""; position:absolute; inset:13px;
    background-color:var(--accent);
    -webkit-mask:url("assets/logo.png") center/contain no-repeat;
    mask:url("assets/logo.png") center/contain no-repeat;
    filter:drop-shadow(0 0 calc(9px*var(--glow,1)) color-mix(in srgb,var(--accent) 78%, transparent));
  }
  @keyframes cursorlogopulse{ 0%,100%{ opacity:.92; transform:scale(1) } 50%{ opacity:1; transform:scale(1.08) } }
  @media (prefers-reduced-motion: no-preference){
    .scan-cursor .scan-reticle::before{ animation:cursorlogopulse 2.4s ease-in-out infinite; }
  }

  /* ---- cinematic scan-cut between vertical sections ---- */
  .scancut{ position:relative; height:clamp(56px,8vh,98px); overflow:hidden; pointer-events:none; z-index:2; }
  .scancut-base{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:min(1180px,86%); height:1px;
    background:linear-gradient(90deg, transparent, color-mix(in srgb,var(--accent) 42%, transparent), transparent); opacity:.5; }
  .scancut-tick{ position:absolute; top:50%; width:9px; height:9px; transform:translateY(-50%); opacity:.6; }
  .scancut-tick.l{ left:calc(7% - 4px); border-left:1px solid var(--accent); border-top:1px solid var(--accent); }
  .scancut-tick.r{ right:calc(7% - 4px); border-right:1px solid var(--accent); border-bottom:1px solid var(--accent); }
  .scancut-sweep{ position:absolute; top:50%; left:0; transform:translateY(-50%); width:160px; height:2px; opacity:0;
    background:linear-gradient(90deg, transparent, var(--accent), transparent);
    box-shadow:0 0 20px color-mix(in srgb,var(--accent) 80%, transparent); }
  @media (prefers-reduced-motion: no-preference){
    .scancut.fire .scancut-sweep{ animation:scancutsweep 1.05s cubic-bezier(.5,0,.2,1); }
  }
  @keyframes scancutsweep{ 0%{ left:-180px; opacity:0 } 12%{ opacity:1 } 86%{ opacity:1 } 100%{ left:100%; opacity:0 } }

  /* ---- trust strip ---- */
  .truststrip{ position:relative; z-index:2; display:flex; align-items:center; justify-content:center; gap:clamp(16px,3vw,40px);
    flex-wrap:wrap; padding:20px 24px; background:rgba(244,247,251,.85); border-top:1px solid var(--line); border-bottom:1px solid var(--line); }
  .truststrip-item{ display:inline-flex; align-items:center; gap:10px; font-family:"Poppins",sans-serif; font-weight:500;
    font-size:13px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
  .truststrip-item svg{ color:var(--accent); opacity:.85; }
  .truststrip-sep{ width:5px; height:5px; border-radius:50%; background:color-mix(in srgb,var(--accent) 55%, transparent); }
  @media (max-width:640px){ .truststrip-sep{ display:none; } }

  /* ===== cinematic layer pack ===== */

  /* (1) chromatic-aberration / RGB-shift glitch on images on hover */
  .glitch{ position:relative; overflow:hidden; }
  .glitch img{ display:block; width:100%; height:100%; object-fit:cover; }
  .glitch .glitch-lay{ position:absolute; inset:0; opacity:0; mix-blend-mode:screen; pointer-events:none;
    transition:opacity .14s ease, transform .14s ease; }
  .glitch .glitch-lay.r{ filter:url(#ca-red); }
  .glitch .glitch-lay.c{ filter:url(#ca-cyan); }
  @media (hover:hover){
    .glitch:hover .glitch-lay, [data-glitch]:hover .glitch-lay{ opacity:.85; }
    .glitch:hover .glitch-lay.r, [data-glitch]:hover .glitch-lay.r{ transform:translate(-6px,1px); }
    .glitch:hover .glitch-lay.c, [data-glitch]:hover .glitch-lay.c{ transform:translate(6px,-1px); }
  }
  @media (hover:hover) and (prefers-reduced-motion: no-preference){
    .glitch:hover .glitch-lay.r, [data-glitch]:hover .glitch-lay.r{ animation:glitchjit .26s steps(2) infinite; }
    .glitch:hover .glitch-lay.c, [data-glitch]:hover .glitch-lay.c{ animation:glitchjit .26s steps(2) infinite reverse; }
  }
  @keyframes glitchjit{ 0%{ transform:translate(-5px,1px) } 50%{ transform:translate(-8px,-2px) } 100%{ transform:translate(-3px,2px) } }

  /* (2) headline typewriter — char reveal + caret (scroll-triggered, like hero H1) */
  .tw-ch{ opacity:0; }
  .tw-ch.on{ opacity:1; animation:twpop .18s ease-out; }
  @keyframes twpop{ from{ opacity:0; } to{ opacity:1; } }
  .tw-caret2{ display:inline-block; color:var(--accent); font-weight:400; transform:translateY(.02em);
    text-shadow:0 0 calc(16px*var(--glow,1)) color-mix(in srgb,var(--accent) 70%, transparent);
    animation:twblink2 .9s steps(1) infinite; }
  @keyframes twblink2{ 0%,55%{ opacity:1 } 56%,100%{ opacity:0 } }
  .btn{ transition:transform .25s cubic-bezier(.2,.8,.2,1), box-shadow .3s, background .3s; }

  /* (5) invert lens cursor — inverts whatever is under the pointer */
  .invert-lens{ position:fixed; top:0; left:0; width:46px; height:46px; border-radius:50%; z-index:8600;
    pointer-events:none; opacity:0; transition:opacity .3s, width .18s cubic-bezier(.2,.9,.2,1), height .18s cubic-bezier(.2,.9,.2,1);
    margin:-23px 0 0 -23px; backdrop-filter:invert(1) hue-rotate(180deg); -webkit-backdrop-filter:invert(1) hue-rotate(180deg);
    box-shadow:0 0 0 1px color-mix(in srgb,var(--accent) 45%, transparent), 0 0 22px color-mix(in srgb,var(--accent) 30%, transparent); }
  .invert-lens.show{ opacity:1; }
  .invert-lens.lock{ width:30px; height:30px; }

  /* (4) scroll-triggered dark→light theme switch on whole sections */
  @property --ink{ syntax:"<color>"; inherits:true; initial-value:#eaf6ff; }
  @property --ink-dim{ syntax:"<color>"; inherits:true; initial-value:#aebfd4; }
